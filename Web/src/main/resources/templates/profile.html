<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Meu Perfil - Open Library</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark shadow-sm mb-4">
    <div class="container">
        <a class="navbar-brand" th:href="@{/dashboard}">
            <i class="bi bi-arrow-left-circle me-2"></i>Voltar ao Dashboard
        </a>
    </div>
</nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-7">

            <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                <i class="bi bi-check-circle-fill me-2"></i> <span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>

            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-2"></i> <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>

            <div class="card shadow-sm border-0">
                <div class="card-header bg-white py-3">
                    <h5 class="mb-0 fw-bold"><i class="bi bi-person-gear me-2"></i>Configurações de Perfil</h5>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/profile/update}" method="post">

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Nome Completo</label>
                            <input type="text" name="name" class="form-control" th:value="${user.name}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Endereço de Email</label>
                            <input type="email" class="form-control bg-light" th:value="${user.email}" disabled>
                            <div class="form-text">O email não pode ser alterado por motivos de segurança.</div>
                        </div>

                        <div class="mb-3" th:if="${session.userRole == 'AUTHOR'}">
                            <label class="form-label fw-semibold">Afiliação / Instituição</label>
                            <input type="text" name="affiliation" class="form-control"
                                   th:value="${authorData != null ? authorData.affiliation : ''}"
                                   placeholder="Ex: Universidade de Coimbra">
                        </div>

                        <hr class="my-4">

                        <h6 class="fw-bold mb-3">Segurança</h6>
                        <div class="mb-3">
                            <label class="form-label">Nova Palavra-passe</label>
                            <input type="password" name="newPassword" class="form-control" placeholder="Deixe em branco para manter a atual">
                        </div>

                        <div class="d-grid gap-2 mt-4">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-save me-2"></i>Guardar Alterações
                            </button>
                        </div>

                    </form>
                </div>
            </div>

            <p class="text-center mt-4 text-muted small">ID de Utilizador: #<span th:text="${user.idUser}"></span></p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
