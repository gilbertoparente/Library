<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Catálogo - Open Library</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/dashboard}">Open Library</a>
    </div>
</nav>

<div class="container">
    <div class="card border-0 shadow-sm mb-4">
        <div class="card-body">
            <form th:action="@{/articles/search}" method="get" class="row g-3">

                <div class="col-md-4">
                    <label class="form-label small fw-bold">Pesquisa Geral</label>
                    <input type="text" name="query" class="form-control" th:value="${lastQuery}" placeholder="Título, DOI ou Keywords...">
                </div>

                <div class="col-md-3">
                    <label class="form-label small fw-bold">Temática</label>
                    <select name="thematic" class="form-select">
                        <option value="">Todas as Temáticas</option>
                        <option th:each="t : ${allThematics}"
                                th:value="${t.idThematic}"
                                th:text="${t.description}"
                                th:selected="${t.idThematic == lastThematic}"></option>
                    </select>
                </div>

                <div class="col-md-3">
                    <label class="form-label small fw-bold">Autor</label>
                    <select name="author" class="form-select">
                        <option value="">Todos os Autores</option>
                        <option th:each="auth : ${allAuthors}"
                                th:value="${auth.user.idUser}"
                                th:text="${auth.user.name}"
                                th:selected="${auth.user.idUser == lastAuthor}"></option>
                    </select>
                </div>

                <div class="col-md-2 d-flex align-items-end">
                    <button type="submit" class="btn btn-primary w-100">Filtrar</button>
                </div>
            </form>
        </div>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                <tr>
                    <th>Artigo</th>
                    <th>Temáticas</th>
                    <th>Autor(es)</th>
                    <th>Preço (IVA Inc.)</th>
                    <th class="text-center">Ações</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="article : ${articles}">
                    <td>
                        <div class="fw-bold" th:text="${article.title}">Título</div>
                        <small class="text-muted" th:text="${article.doi}"></small>
                    </td>
                    <td>
                            <span th:each="t : ${article.thematics}"
                                  class="badge bg-info text-dark me-1"
                                  th:text="${t.description}"></span>
                    </td>
                    <td th:text="${article.displayAuthors}"></td>
                    <td class="fw-bold text-primary" th:text="${#numbers.formatCurrency(article.getFullPrice())}"></td>
                        <td class="text-center">
                            <div class="btn-group btn-group-sm">
                                <a th:href="@{/articles/details/{id}(id=${article.idArticle})}"
                               class="btn btn-outline-primary" title="Ver Detalhes">
                                <i class="bi bi-eye"></i>
                                    </a>

                                <th:block th:if="${session.userRole == 'READER'}">

                                    <a th:if="${article.price == 0 or article.price == null}"
                                   th:href="@{/articles/acquire-free/{id}(id=${article.idArticle})}"
                                   class="btn btn-info text-white" title="Adicionar à minha Biblioteca">
                                    <i class="bi bi-journal-plus"></i>
                                    </a>

                                    <button th:if="${article.price > 0}"
                                                class="btn btn-success" title="Comprar Artigo">
                                         <i class="bi bi-cart-plus"></i>
                                    </button>

                            </th:block>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
