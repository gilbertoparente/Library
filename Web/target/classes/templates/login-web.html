<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Library - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; font-family: 'Inter', sans-serif; }
        .login-card { border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .logo-main { max-width: 180px; margin-bottom: 2rem; transition: transform 0.3s; }
        .logo-main:hover { transform: scale(1.05); }
        .btn-primary-custom { background-color: #2c3e50; border: none; padding: 12px; font-weight: 600; transition: 0.3s; }
        .btn-primary-custom:hover { background-color: #34495e; transform: translateY(-2px); }
        .form-control:focus { box-shadow: none; border: 1px solid #3498db; }
    </style>
</head>
<body>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5 text-center">

            <a th:href="@{/}">
                <img th:src="@{/images/FullLogo_Transparent.png}" alt="Open Library Logo" class="logo-main">
            </a>

            <div class="card login-card text-start p-4 p-md-5">
                <h3 class="mb-2 fw-bold text-dark text-center">Login</h3>
                <p class="text-muted text-center mb-4">Aceda à sua biblioteca científica</p>

                <div th:if="${error}" class="alert alert-danger border-0 py-2 small" th:text="${error}"></div>

                <div th:if="${param.success}" class="alert alert-success border-0 py-2 small">
                    <i class="bi bi-check-circle-fill me-2"></i> Conta criada! Inicie sessão abaixo.
                </div>

                <div th:if="${param.logout}" class="alert alert-info border-0 py-2 small">
                    Sessão terminada com sucesso.
                </div>

                <form th:action="@{/login}" method="post">
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-muted">E-mail</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-0"><i class="bi bi-envelope text-muted"></i></span>
                            <input type="email" name="email" class="form-control form-control-lg bg-light border-0 fs-6"
                                   placeholder="exemplo@email.com" required autofocus>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label small fw-bold text-muted">Palavra-passe</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-0"><i class="bi bi-lock text-muted"></i></span>
                            <input type="password" name="password" class="form-control form-control-lg bg-light border-0 fs-6"
                                   placeholder="••••••••" required>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary-custom text-white w-100 mb-3 shadow-sm">
                        Entrar no Portal
                    </button>

                    <div class="text-center mt-3">
                        <span class="small text-muted">Novo por aqui?
                            <a th:href="@{/register}" class="text-primary fw-bold text-decoration-none">Registe-se como Leitor ou Autor</a>
                        </span>
                    </div>
                </form>
            </div>

            <p class="mt-5 text-muted small">
                &copy; 2026 Open Library - Plataforma de Investigação.
            </p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
